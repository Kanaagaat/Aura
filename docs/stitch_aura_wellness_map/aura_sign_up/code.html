<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aura - Join the Community</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#424842",
                        "inverse-on-surface": "#f1f1ec",
                        "surface-container-highest": "#e2e3de",
                        "on-primary-fixed-variant": "#2d4e33",
                        "inverse-primary": "#aad0ad",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#b68e52",
                        "secondary": "#7b554a",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#402900",
                        "on-secondary-container": "#7a5449",
                        "surface-tint": "#44664a",
                        "outline": "#727971",
                        "on-tertiary-fixed": "#291800",
                        "surface-bright": "#fafaf5",
                        "secondary-fixed-dim": "#ecbcae",
                        "on-primary": "#ffffff",
                        "inverse-surface": "#2f312e",
                        "tertiary-fixed": "#ffddb0",
                        "primary-container": "#7a9e7e",
                        "surface-container": "#eeeeea",
                        "on-primary-container": "#13341c",
                        "primary": "#44664a",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e8e8e4",
                        "on-secondary-fixed-variant": "#603e34",
                        "on-tertiary-fixed-variant": "#5f410a",
                        "on-background": "#1a1c1a",
                        "on-secondary-fixed": "#2e140c",
                        "tertiary": "#7a5821",
                        "primary-fixed": "#c6ecc8",
                        "secondary-fixed": "#ffdbd0",
                        "secondary-container": "#feccbe",
                        "background": "#fafaf5",
                        "surface-container-low": "#f4f4ef",
                        "surface-dim": "#dadad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e2e3de",
                        "surface": "#fafaf5",
                        "on-surface": "#1a1c1a",
                        "on-primary-fixed": "#00210b",
                        "primary-fixed-dim": "#aad0ad",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#ecbf7e",
                        "outline-variant": "#c2c8bf"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "form": "14px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "24px",
                        "stack-sm": "12px",
                        "unit": "8px",
                        "gutter": "16px",
                        "container-margin-mobile": "20px",
                        "container-margin-desktop": "48px",
                        "stack-lg": "40px"
                    },
                    "fontFamily": {
                        "body-md": ["DM Sans"],
                        "label-md": ["DM Sans"],
                        "headline-lg": ["Playfair Display"],
                        "caption": ["DM Sans"],
                        "display-lg": ["Playfair Display"],
                        "display-md": ["Playfair Display"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "body-lg": ["DM Sans"],
                        "title-lg": ["DM Sans"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "1.3", "fontWeight": "400"}],
                        "caption": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "0.02em", "fontWeight": "300"}],
                        "display-md": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "400"}],
                        "headline-lg-mobile": ["20px", {"lineHeight": "1.3", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "title-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #FAFAF7; /* Warm White */
        }
        .form-input-bg {
            background-color: #F5F3EF;
        }
        .organic-circles {
            filter: blur(40px);
            opacity: 0.7;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-container-margin-mobile md:p-0">
<!-- Auth Modal Container -->
<main class="w-full max-w-[520px] bg-surface-container-lowest rounded-[32px] overflow-hidden shadow-[0px_2px_16px_rgba(0,0,0,0.06)] border border-[#EEECE8] transition-all duration-500 animate-in fade-in zoom-in slide-in-from-bottom-4">
<!-- Top Abstract Illustration Area -->
<div class="relative w-full h-48 bg-surface-container-low flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 organic-circles">
<div class="absolute top-[-10%] left-[20%] w-48 h-48 rounded-full bg-primary-container/40 animate-pulse" style="animation-duration: 4s;"></div>
<div class="absolute top-[20%] right-[15%] w-56 h-56 rounded-full bg-secondary-container/30 animate-pulse" style="animation-duration: 5s; animation-delay: 1s;"></div>
<div class="absolute bottom-[-20%] left-[30%] w-40 h-40 rounded-full bg-tertiary-fixed-dim/40 animate-pulse" style="animation-duration: 6s; animation-delay: 0.5s;"></div>
</div>
<div class="relative z-10 flex flex-col items-center">
<h1 class="font-display-md text-[42px] leading-tight text-on-background font-[300]">aura</h1>
<p class="font-label-md text-label-md tracking-[0.2em] text-on-surface-variant uppercase mt-1">find your people. find your place.</p>
</div>
</div>
<!-- Form Content -->
<div class="px-gutter md:px-12 py-10">
<div class="space-y-stack-md">
<!-- Inputs -->
<div class="space-y-stack-sm">
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="name">Full Name</label>
<input class="w-full px-6 py-4 rounded-form border-none form-input-bg font-body-md text-on-surface focus:ring-2 focus:ring-primary-container transition-shadow placeholder:text-outline-variant" id="name" placeholder="Elias Thorne" type="text"/>
</div>
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<input class="w-full px-6 py-4 rounded-form border-none form-input-bg font-body-md text-on-surface focus:ring-2 focus:ring-primary-container transition-shadow placeholder:text-outline-variant" id="email" placeholder="hello@aurawellness.com" type="email"/>
</div>
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full px-6 py-4 rounded-form border-none form-input-bg font-body-md text-on-surface focus:ring-2 focus:ring-primary-container transition-shadow placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
</div>
<!-- CTAs -->
<div class="space-y-stack-sm pt-4">
<button class="w-full py-4 rounded-full bg-[#1C1C1A] text-white font-title-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-sm">
                        Create account
                    </button>
<div class="relative flex items-center justify-center py-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant opacity-30"></div>
</div>
<span class="relative px-4 bg-surface-container-lowest text-label-md text-on-surface-variant/60 font-label-md">OR</span>
</div>
<button class="w-full py-4 rounded-full border border-outline-variant bg-transparent flex items-center justify-center gap-3 font-title-lg text-on-surface hover:bg-surface-container-low transition-colors group">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Continue with Google
                    </button>
</div>
<!-- Footer Link -->
<div class="text-center pt-2">
<p class="font-body-md text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-medium hover:underline decoration-primary/30 underline-offset-4" href="#">Sign in</a>
</p>
</div>
</div>
</div>
<!-- Progress Indicator (Optional visual flair) -->
<div class="h-1 w-full bg-surface-container flex">
<div class="h-full w-1/3 bg-primary/20"></div>
<div class="h-full w-2/3 bg-transparent"></div>
</div>
</main>
<!-- Subtle atmospheric background text -->
<div class="fixed bottom-12 left-1/2 -translate-x-1/2 opacity-[0.03] select-none pointer-events-none hidden md:block">
<span class="font-display-lg text-[120px] whitespace-nowrap">WELLNESS COMMUNITY MINDFULNESS</span>
</div>
<script>
        // Micro-interaction for inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
                input.parentElement.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
