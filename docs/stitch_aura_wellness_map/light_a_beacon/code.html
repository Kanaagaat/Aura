</header>
<!-- Scrollable Body -->
<div class="flex-1 overflow-y-auto px-8 pb-8 custom-scrollbar space-y-8">

</div>
<div class="mt-4 flex flex-wrap gap-2">

<span class="material-symbols-outlined text-[16px]">history</span> Grounded Cafe
                        </button>

<span class="text-4xl mb-3 block group-hover:scale-110 transition-transform">🌿</span>

</button>
<button class="group p-6 bg-surface rounded-2xl border border-surface-container-highest hover:border-primary/40 hover:bg-primary/5 transition-all flex flex-col items-center text-center">

</section>

<div class="fixed inset-0 -z-10 opacity-20 pointer-events-none">

</div>
<script>
        // Micro-interaction for activity selection
        const activityButtons = document.querySelectorAll('button.group');
        activityButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                activityButtons.forEach(b => {
                    b.classList.remove('border-primary/20', 'bg-primary-fixed-dim/20');
                    b.querySelector('span:last-child').classList.remove('text-primary', 'font-bold');
                    b.querySelector('span:last-child').classList.add('text-on-surface');
                });
                btn.classList.add('border-primary/20', 'bg-primary-fixed-dim/20');
                btn.querySelector('span:last-child').classList.add('text-primary', 'font-bold');
                btn.querySelector('span:last-child').classList.remove('text-on-surface');
            });
        });

        // Time selector micro-interaction
        const timeButtons = document.querySelectorAll('.grid.grid-cols-4 button');
        timeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                timeButtons.forEach(b => {
                    b.classList.remove('bg-primary', 'text-white');
                    b.classList.add('bg-surface-container', 'text-on-surface-variant');
                });
                btn.classList.add('bg-primary', 'text-white');
                btn.classList.remove('bg-surface-container', 'text-on-surface-variant');
            });
        });
    </script>
